<!DOCTYPE html>
<html lang="en" dir="ltr">



<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="rgb(0 122 255)">

    <title>Control Panel</title>

    <!-- BootStrap 5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>

    <!-- Chart -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.js"
        integrity="sha512-D4pL3vNgjkHR/qq+nZywuS6Hg1gwR+UzrdBW6Yg8l26revKyQHMgPq9CLJ2+HHalepS+NuGw1ayCCsGXu9JCXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>


    <link href="" rel="stylesheet" />

    <style>
        #AlertLocation {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 250px;
            z-index: 1050;
        }

        .alert {
            position: relative;
        }


        .alertAnimate {
            animation: fadeIn 1s ease-out forwards;

        }

        .alertReverse {
            animation: fadeIn 1s ease-out reverse;
            animation-fill-mode: forwards;

        }

        .scrollable {
            max-height: 800px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            background-color: #f9f9f9;
            font-size: 15px;
            font-family: monospace;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translatex(200px);
            }

            50% {
                opacity: 0.8;
                transform: translateX(-50px);
            }

            70% {
                opacity: 0.9;
                transform: translateX(20px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div id="AlertLocation">
        <div id="liveAlertPlaceholder"></div>
    </div>

    <div class="container mt-5">
        <h1 class="">Control Panel
            <button type="button" class="btn btn-danger" id="LogOutButton">Log Out</button>
        </h1>

        <div id="userStatus">
            You are: <span id="isLoggedin"></span> as: <b><span id="getUsername">?????</span></b> who is an admin:
            <b><span id="isAdmin">????</span></b>
        </div>



        <div class="row">
            <div class="col-10">



                <div class="input-group mb-3" id="login">
                    <button class="btn btn-outline-secondary" type="button" id="loginButton">Submit</button>
                    <input type="text" class="form-control" placeholder="User Name" id="userVal">
                    <input type="text" class="form-control" placeholder="Password" id="passVal">
                </div>


            </div>
            <div class="col-2">

            </div>
        </div>
    </div>



    <div class="container" id="serverRequestHist">





        <div class="row">


            <div class="col-12">
                <h1 class=" mt-5">Server Request Histogram</h1>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <button class="btn btn-outline-secondary" id="updateData" type="button">Update Data</button>
                    </div>
                    <input type="text" class="form-control" id="newStepSize" value="60s" aria-label=""
                        aria-describedby="basic-addon1">
                </div>
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <h1 class=" mt-5">Server Log</h1>
                <div class="container scrollable" id="serverLog">

                </div>
            </div>
            <div class="col-6">
                <h1 class=" mt-5">IP Log</h1>
                <div class="container scrollable" id="ipLog">

                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-6">
                <h1 class=" mt-5">User DB</h1>
                <div class="container scrollable" id="userDB">

                </div>
            </div>
            <div class="col-6">
                <h1 class=" mt-5">Failed URLs</h1>
                <div class="container scrollable" id="failedUrls">

                </div>
            </div>
        </div>
    </div>











</body>

<script>
    const alertPlaceholder = document.getElementById('liveAlertPlaceholder');
    const logOutButton = document.getElementById('LogOutButton');
    const loginField = document.getElementById('login');
    const loginButton = document.getElementById('loginButton');
    const userStatus = document.getElementById('userStatus');
    const serverRHist = document.getElementById('serverRequestHist');
    const serverLog = document.getElementById('serverLog');

    serverRHist.style.display = 'none';
    userStatus.style.visibility = 'hidden';
    loginField.style.display = 'none';
    logOutButton.style.display = 'none';


    checkifLoggedIn();


    //Functions
    const appendAlert = (message, type) => {
        const uuid = Date.now();
        const wrapper = document.createElement('div')
        wrapper.innerHTML = [
            `<div class="alert alert-${type} alert-dismissible alertAnimate" role="alert" id="${uuid}">`,
            `   <div>${message}</div>`,
            '   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>',
            '</div>'
        ].join('')
        alertPlaceholder.append(wrapper);
        var alertNode = document.getElementById(uuid);
        setTimeout(function() {
            var alertNode = document.getElementById(uuid);
            if (alertNode) {
                alertNode.classList.remove('alertAnimate'); // If removing a class first
                void alertNode.offsetWidth;
                alertNode.classList.add('alertReverse');
            }
            setTimeout(function() {
                var alertNode = document.getElementById(uuid);
                if (alertNode) {
                    alertNode.remove();
                }
            }, 1000);
        }, 5000);
    }


    function showLoggedin() {
        fetch("/auth/getUsername")
            .then(res => res.text())
            .then(d => {
                (d) ? document.getElementById("getUsername").innerHTML = d: document.getElementById("getUsername")
                    .innerHTML = "n/a";
            });
        fetch("/auth/isAdmin")
            .then(res => res.text())
            .then(d => {
                (d) ? document.getElementById("isAdmin").innerHTML = d: document.getElementById("isAdmin")
                    .innerHTML = "n/a";
            });
        userStatus.style.visibility = 'visible';
        logOutButton.style.display = 'inline-block';
        loginField.style.display = 'none';
        buildTable(60);
        serverRHist.style.display = 'block';

        fetch("/log/server")
            .then(res => res.text())
            .then(d => {

                serverLog.innerHTML = `<pre>${d}</pre>`;
            });

        fetch("/log/Ips")
            .then(res => res.text())
            .then(d => {
                d = JSON.stringify(JSON.parse(d), null, 2);
                document.getElementById("ipLog").innerHTML = `<pre>${d}</pre>`;
            });


        fetch("/log/userDB")
            .then(res => res.text())
            .then(d => {

                document.getElementById("userDB").innerHTML = `<pre>${d}</pre>`;
            });

        fetch("/log/failedURLs")
            .then(res => res.text())
            .then(d => {

                document.getElementById("failedUrls").innerHTML = `<pre>${d}</pre>`;
            });

    }

    function showLoggedout() {
        document.getElementById("userVal").value = document.getElementById("userVal").ariaPlaceholder;
        document.getElementById("passVal").value = document.getElementById("passVal").ariaPlaceholder;
        userStatus.style.visibility = 'hidden';
        logOutButton.style.display = 'none';
        loginField.style.display = 'flex';
        serverRHist.style.display = 'none';
    }


    function checkifLoggedIn() {
        fetch('/auth/isLoggedin')
            .then(res => res.text())
            .then(d => {
                if (d === 'true') {
                    showLoggedin();

                } else {
                    appendAlert('You Are Not Logged in', 'primary')
                    showLoggedout();

                }
            });
    }




    //Events
    logOutButton.onclick = function() {
        fetch('/auth/logout')
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.text()
            })
            .then(d => {
                appendAlert('You Are Now Logged out', 'primary');
                showLoggedout();
            })

    };


    loginButton.onclick = function() {
        var user = document.getElementById("userVal").value;
        var pass = document.getElementById("passVal").value;
        fetch(`/auth/quick-signin/?user=${user}&password=${pass}`)
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.text()
            })
            .then(d => {
                switch (d) {
                    case "Incorrect Password":
                        appendAlert('Incorrect Password', 'warning')
                        break;

                    case "User Cannot be Found":
                        appendAlert('User Cannot be Found', 'warning')
                        break;

                    case "You Are logged IN":
                        appendAlert('You Are Now Logged in', 'primary')
                        showLoggedin();
                        break;
                }

            })


    };




    //chart functions
    var myChart;

    function prettyDate(dt) {
        var seconds = (dt) / 1000;
        var d = Math.floor(seconds / (3600 * 24));
        var h = Math.floor(seconds % (3600 * 24) / 3600);
        var m = Math.floor(seconds % 3600 / 60);
        var s = Math.floor(seconds % 60);
        var ret = (d > 0 ? d + "d" : "") + (h > 0 ? h + "h" : "") + (m > 0 ? m + "m" : "") + (s > 0 ? s + "s" : "");
        ret = (ret == "" ? "0s" : ret);
        return ret;
    }


    function getSecs(str) {
        var d = 0,
            h = 0,
            min = 0,
            sec = 0;

        if (str.includes("d")) {
            d = str.split("d")[0];
            str = str.split("d")[1];
        }

        if (str.includes("h")) {
            h = str.split("h")[0];
            str = str.split("h")[1];
        }

        if (str.includes("m")) {
            min = str.split("m")[0];
            str = str.split("m")[1];
        }

        if (str.includes("s")) {
            sec = str.split("s")[0];
        } else {
            sec = str;
        }

        ret = Number(sec) + 60 * min + 3600 * h + 3600 * 24 * d;
        if (isNaN(ret) || ret <= 0) {
            ret = 60;
        }
        return ret;
    }


    document.getElementById("updateData").onclick = function() {
        var val = document.getElementById("newStepSize").value;
        val = getSecs(val);
        document.getElementById("newStepSize").value = prettyDate(val * 1000);
        buildTable(val);
    };


    function buildTable(step) {
        var histogram = {};
        var maxStep = 0;
        fetch('/log/server')
            .then(res => res.text())
            .then(d => {
                if (d === "You need to be logged in as admin to see this page") {
                    alert("Not admin");
                    return;
                }
                d = JSON.parse('[' + d.slice(0, -1) + ']');
                for (let i = 0; i < d.length; i++) {
                    var stepped = Math.floor(getSecs(d[i].at) / step);
                    maxStep = Math.max(maxStep, stepped);
                    (histogram[stepped.toString()]) ? histogram[stepped.toString()]++: histogram[stepped
                            .toString()] =
                        1;
                }
                for (let i = 0; i <= maxStep; i++) {
                    if (!histogram[i.toString()]) {
                        histogram[i.toString()] = 0;
                    }
                }
                var xValues = Object.keys(histogram);
                for (let i = 0; i < xValues.length; i++) {
                    xValues[i] = prettyDate(Number(xValues[i]) * step * 1000);
                }
                var yValues = Object.values(histogram);
                const ctx = document.getElementById('myChart');
                if (myChart) {
                    myChart.destroy();
                }
                myChart = new Chart(ctx, {
                    type: "bar",

                    data: {
                        labels: xValues,
                        datasets: [{
                            label: 'Number of requests',
                            fill: false,
                            lineTension: 0.3,
                            backgroundColor: "rgba(0,0,255,1.0)",
                            borderColor: "rgba(0,0,255,0.1)",
                            data: yValues
                        }]
                    }
                });
            });
    }



    /*

   

    const alertTrigger = document.getElementById('liveAlertBtn')
    if (alertTrigger) {
        alertTrigger.addEventListener('click', () => {
            appendAlert('Nice, you triggered this alert message!', 'success')
        })
    }
    */
</script>



</html>
